<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="Daniela și Cristian — monogramă hexagonală">
  <title>Daniela &amp; Cristian — hexagon modern</title>
  <defs>
    <style>
      @font-face {
        font-family: 'CGNormal';
        src: url('https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond/files/cormorant-garamond-latin-400-normal.woff2') format('woff2');
        font-display: swap;
      }
      @font-face {
        font-family: 'CGItalic';
        src: url('https://cdn.jsdelivr.net/npm/@fontsource/cormorant-garamond/files/cormorant-garamond-latin-400-italic.woff2') format('woff2');
        font-display: swap;
        font-style: italic;
      }
      .ltr {
        font-family: 'Cormorant Garamond', 'CGNormal', Georgia, serif;
        font-weight: 500;
        fill: #6B2030;
      }
      .amp {
        font-family: 'Cormorant Garamond', 'CGItalic', Georgia, serif;
        font-style: italic;
        fill: #A86878;
      }
      .yr {
        font-family: 'Cormorant Garamond', 'CGNormal', Georgia, serif;
        font-style: italic;
        fill: #A86878;
      }
    </style>
  </defs>
  <g transform="translate(100, 100)">
    <path d="M 0 -75 L 65 -37.5 L 65 37.5 L 0 75 L -65 37.5 L -65 -37.5 Z"
          fill="none" stroke="#C68B95" stroke-width="1" stroke-linejoin="round"/>
    <text class="ltr" font-size="56" text-anchor="middle" dominant-baseline="central" x="-28" y="-2">D</text>
    <text class="amp" font-size="32" text-anchor="middle" dominant-baseline="central" x="0" y="-2">&amp;</text>
    <text class="ltr" font-size="56" text-anchor="middle" dominant-baseline="central" x="28" y="-2">C</text>
    <line x1="-22" y1="28" x2="22" y2="28" stroke="#C68B95" stroke-width="0.5"/>
    <text class="yr" font-size="11" text-anchor="middle" x="0" y="46" letter-spacing="0.35em">2027</text>
  </g>
</svg>
