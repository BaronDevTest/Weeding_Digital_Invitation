{{- $fullName := include "app.fullname" . -}}
{{- range $workloadKey, $workload := .Values.job -}}
{{- if and $workload.enabled $workload.schedule -}}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ printf "%s-%s" $fullName $workloadKey }}
  labels:
    {{- include "app.labels" $ | nindent 4 }}
    {{- toYaml $workload.labels | nindent 4 }}
{{- with $workload.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
{{- end }}
spec:
  schedule: {{ required "schedule is required!" $workload.schedule | quote }}
  startingDeadlineSeconds: {{ default 3600 $workload.startingDeadlineSeconds }}
  concurrencyPolicy: {{ default "Forbid" $workload.concurrencyPolicy }}
{{- with $workload.successfulJobsHistoryLimit }}
  successfulJobsHistoryLimit: {{ . }}
{{- end }}
{{- with $workload.failedJobsHistoryLimit }}
  failedJobsHistoryLimit: {{ . }}
{{- end }}
  jobTemplate:
    spec:
    {{- with $workload.backoffLimit }}
      backoffLimit: {{ . }}
    {{- end }}
    {{- with $workload.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
    {{- end }}
      template:
        metadata:
          labels:
            {{- include "app.selector" $ | nindent 12 }}
            {{- toYaml $workload.labels | nindent 12 }}
            {{- with $workload.podLabels }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with $workload.podAnnotations }}
          annotations: {{- toYaml . | nindent 12 }}
        {{- end }}
        spec:
        {{- if $workload.podSecurityContext }}
          securityContext: {{- toYaml $workload.podSecurityContext | nindent 12 }}
        {{- else }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
        {{- end }}
        {{- if not $workload.automountServiceAccountToken }}
          automountServiceAccountToken: false
        {{- end }}
        {{- if and (or ($.Values.serviceAccount).create ($.Values.serviceAccount).name) (not $workload.defaultServiceAccount) }}
          serviceAccountName: {{ default $fullName ($.Values.serviceAccount).name }}
        {{- end }}
        {{- with $.Values.imagePullSecrets }}
          imagePullSecrets: {{ toYaml . | nindent 10 }}
        {{- end }}
          restartPolicy: {{ default "Never" $workload.restartPolicy }}
          containers:
          - name: {{ printf "%s-%s" $.Chart.Name $workloadKey | quote }}
            image: {{ printf "%s:%s" (required "image.repository is required!" ($workload.image).repository) (required "either .Chart.AppVersion or image.tag is required!" (default $.Chart.AppVersion $workload.image.tag)) | quote }}
            imagePullPolicy: {{ default "IfNotPresent" $workload.image.pullPolicy }}
          {{- with $workload.command }}
            command: {{ . }}
          {{- end }}
          {{- with $workload.args }}
            args: 
            {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
          {{- end }}
          {{- if $workload.env }}
            env:
            {{- with $workload.env }}
              {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
            {{- end }}
          {{- else if or $.Values.timeZone $.Values.dotnetEnvironment (eq (default "none" $workload.envPreset) "aspnet") $workload.envFromSecret $workload.envExtra }}
            env:
            {{- with $.Values.timeZone }}
            - name: TZ
              value: {{ . }}
            {{- end }}
            {{- with $.Values.dotnetEnvironment }}
            - name: DOTNET_ENVIRONMENT
              value: {{ . }}
            {{- end }}
            {{- if eq (default "none" $workload.envPreset) "aspnet" }}
            - name: ASPNETCORE_URLS
              value: http://*:8080/;http://*:9090/
            - name: ASPNETCORE_MANAGEMENTPORT
              value: "9090"
            - name: DOTNET_EnableDiagnostics
              value: "0"
            {{- end }}
            {{- range $envFromSecret := $workload.envFromSecret }}
              {{- $targetKey := $envFromSecret.secretKeyRef.key }}
              {{- $secretName := "" }}
              {{- range $.Values.integrations.database }}
                {{- if eq .secretKey $targetKey }}
                  {{- $secretName = .secretName }}
                {{- end }}
              {{- end }}
            - name: {{ $envFromSecret.name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $secretName }}
                  key: {{ $targetKey }}
            {{- end }}
            {{- with $workload.envExtra }}
              {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
            {{- end }}
          {{- end }}
          {{- if $workload.ports }}
            ports:
            {{- with $workload.ports }}
              {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
            {{- end }}
          {{- else if eq (default "none" $workload.portsPreset) "aspnet" }}
            ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9090
          {{- end }}
          {{- with $workload.startupProbe }}
            startupProbe: {{- toYaml . | nindent 14 }}
          {{- end }}
          {{- with $workload.readinessProbe }}
            readinessProbe: {{- toYaml . | nindent 14 }}
          {{- end }}
          {{- with $workload.livenessProbe }}
            livenessProbe: {{- toYaml . | nindent 14 }}
          {{- end }}
          {{- if eq (default "none" $workload.probesPreset) "aspnet" }}
            startupProbe:
              httpGet:
                path: /health
                port: management
              initialDelaySeconds: 15
              failureThreshold: 5
              timeoutSeconds: 30
            readinessProbe:
              httpGet:
                path: /health
                port: management
              initialDelaySeconds: 2
              periodSeconds: 2
              timeoutSeconds: 5
            livenessProbe:
              httpGet:
                path: /health
                port: management
              periodSeconds: 30
              timeoutSeconds: 30
          {{- end }}
          {{- if $workload.resources }}
            resources: {{- toYaml $workload.resources | nindent 14 }}
          {{- else }}
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 256Mi
                cpu: 500m
          {{- end }}
          {{- if $workload.containerSecurityContext }}
            securityContext: {{- toYaml $workload.containerSecurityContext | nindent 14 }}
          {{- else }}
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
          {{- end }}
          {{- if $workload.volumeMounts }}
            volumeMounts:
              {{- with $workload.volumeMounts }}
                {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
              {{- end }}
          {{- else if or $workload.mountPreset $workload.volumeMountsExtra }}
            volumeMounts:
            {{- if ($workload.mountPreset).appSettings }}
            - name: settings
              mountPath: /codwer-app/appsettings.json
              subPath: appsettings.json
              readOnly: true
            {{- end }}
            {{- if ($workload.mountPreset).dataProtectionKeys }}
            - name: data-protection
              mountPath: /codwer-app/Files/DataProtectionKeys
              readOnly: true
            {{- end }}
           {{- if ($workload.mountPreset).certificate }}
            - name: certificate
              mountPath: /codwer-app/Files/Certificates/Service
              readOnly: true
            {{- end }}
            {{- if ($workload.mountPreset).trustedCertificates }}
            - name: trusted-certificates
              mountPath: /codwer-app/Files/Certificates/Trusted
              readOnly: true
            {{- end }}
            {{- with $workload.volumeMountsExtra }}
              {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
            {{- end }}
          {{- end }}
        {{- if $workload.volumes }}
          volumes:
            {{- with $workload.volumes }}
                {{- if kindIs "string" . }}{{ tpl . $ | nindent 10 }}{{ else }}{{ toYaml . | nindent 10 }}{{ end }}
            {{- end }}
        {{- else if or $workload.mountPreset $workload.volumesExtra }}
          volumes:
          {{- if ($workload.mountPreset).appSettings }}
          - name: settings
            configMap:
              name: {{ printf "%s-%s" $fullName (default $workloadKey $workload.mountPreset.appSettingsName) }}
          {{- end }}
          {{- if ($workload.mountPreset).dataProtectionKeys }}
          - name: data-protection
            secret:
              secretName: {{ required "integrations.dataProtectionKeys.secretName required!" $.Values.integrations.dataProtectionKeys.secretName }}
          {{- end }}
           {{- if ($workload.mountPreset).trustedCertificates }}
          - name: trusted-certificates
            configMap:
              name: {{ required "integrations.trustedCertificates.configName required!" $.Values.integrations.trustedCertificates.configName }}
          {{- end }}
          {{- if ($workload.mountPreset).certificate }}
          - name: certificate
            secret:
              secretName: {{ required "integrations.certificate.secretName required!" $.Values.integrations.certificate.secretName }}
          {{- end }}
          {{- with $workload.volumesExtra }}
            {{- if kindIs "string" . }}{{ tpl . $ | nindent 10 }}{{ else }}{{ toYaml . | nindent 10 }}{{ end }}
          {{- end }}
        {{- end }}
        {{- with $workload.hostAliases }}
          hostAliases: {{- if kindIs "string" . }}{{ tpl . $ | nindent 10 }}{{ else }}{{ toYaml . | nindent 10 }}{{ end }}
        {{- end }}
        {{- with $workload.readinessGates }}
          readinessGates: {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- with (default 60 $workload.terminationGracePeriodSeconds) }}
          terminationGracePeriodSeconds: {{ . }}
        {{- end }}
        {{- with $workload.nodeSelector }}
          nodeSelector: {{- if kindIs "string" . }}{{ tpl . $ | nindent 12 }}{{ else }}{{ toYaml . | nindent 12 }}{{ end }}
        {{- end }}
        {{- with $workload.tolerations }}
          tolerations: {{- if kindIs "string" . }}{{ tpl . $ | nindent 10 }}{{ else }}{{ toYaml . | nindent 10 }}{{ end }}
        {{- end }}
---
{{- end }}
{{- end }}