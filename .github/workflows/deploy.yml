name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: barondevtest/wedding-invitation

jobs:
  # ============================================================
  # Job 1: build imaginea + push catre ghcr.io
  # ============================================================
  build-and-push:
    name: Build & push image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=wedding-invitation
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Job 2: deploy pe cluster via Helm
  # ============================================================
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: v1.31.0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.0

      - name: Configure kubeconfig
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          if [ -z "$KUBE_CONFIG" ]; then
            echo "::error::Secret KUBE_CONFIG nu este setat. Mergi la repo Settings → Secrets and variables → Actions și adaugă secretul KUBE_CONFIG cu kubeconfig-ul codat base64."
            exit 1
          fi
          mkdir -p "$HOME/.kube"
          echo "$KUBE_CONFIG" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          kubectl cluster-info
          kubectl get nodes

      - name: Helm lint
        run: helm lint ./deploy/chart -f ./deploy/values.yaml

      - name: Helm upgrade --install
        run: |
          helm upgrade --install wedding ./deploy/chart \
            --namespace wedding \
            --create-namespace \
            --values ./deploy/values.yaml \
            --set deployment.web.image.tag=${{ needs.build-and-push.outputs.image-tag }} \
            --wait \
            --timeout 3m

      - name: Verify rollout
        run: |
          kubectl -n wedding rollout status deployment/wedding-invitation-web --timeout=60s
          kubectl -n wedding get deploy,svc,ingress,pods -o wide

      - name: Smoke test (/healthz)
        run: |
          kubectl -n wedding port-forward svc/wedding-invitation-web 8080:80 &
          PF_PID=$!
          trap "kill $PF_PID 2>/dev/null || true" EXIT
          sleep 4
          curl -fsS --retry 5 --retry-delay 2 http://localhost:8080/healthz
